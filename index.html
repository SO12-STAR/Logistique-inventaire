<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard TRS Industriel</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
  .container { width: 90%; margin: auto; }
  h1 { text-align: center; margin: 20px 0; }
  .kpi-cards { display: flex; justify-content: space-around; margin-bottom: 30px; }
  .card { background: #fff; padding: 20px; width: 22%; text-align: center; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  .card h2 { margin: 0; font-size: 2em; }
  .card p { margin: 5px 0 0 0; font-weight: bold; }
  canvas { background: #fff; border-radius: 8px; padding: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); margin-bottom: 30px; }
</style>
</head>
<body>
 
<div class="container">
<h1>Dashboard TRS Industriel - Janvier 2026</h1>
 
  <!-- KPI Cards -->
<div class="kpi-cards">
<div class="card" id="trs-card"><h2>--</h2><p>TRS moyen</p></div>
<div class="card" id="dispo-card"><h2>--</h2><p>Disponibilité</p></div>
<div class="card" id="perf-card"><h2>--</h2><p>Performance</p></div>
<div class="card" id="qual-card"><h2>--</h2><p>Qualité</p></div>
</div>
 
  <!-- Charts -->
<canvas id="trsChart" height="100"></canvas>
<canvas id="dpqChart" height="100"></canvas>
</div>
 
<script>
// Dataset simplifié (exemple)
const data = [
  { date:"01/01/2026", trs:69.27, dispo:87.5, perf:83.33, qual:95, prod:400, theo:480 },
  { date:"02/01/2026", trs:76.9, dispo:98.96, perf:80.42, qual:96.63, prod:386, theo:480 },
  { date:"03/01/2026", trs:83.36, dispo:94.38, perf:91.88, qual:96.15, prod:441, theo:480 },
  { date:"04/01/2026", trs:83.64, dispo:91.88, perf:93.75, qual:97.11, prod:450, theo:480 },
  { date:"05/01/2026", trs:86.47, dispo:95.42, perf:92.29, qual:98.19, prod:443, theo:480 },
  { date:"06/01/2026", trs:93.18, dispo:99.17, perf:96.67, qual:97.2, prod:464, theo:480 },
  { date:"07/01/2026", trs:95.24, dispo:99.17, perf:97.08, qual:98.93, prod:466, theo:480 }
];
 
// Calcul KPI moyens
let trsAvg = data.reduce((a,b)=>a+b.trs,0)/data.length;
let dispoAvg = data.reduce((a,b)=>a+b.dispo,0)/data.length;
let perfAvg = data.reduce((a,b)=>a+b.perf,0)/data.length;
let qualAvg = data.reduce((a,b)=>a+b.qual,0)/data.length;
 
// Mettre à jour les cartes KPI
document.getElementById('trs-card').querySelector('h2').textContent = trsAvg.toFixed(2) + '%';
document.getElementById('dispo-card').querySelector('h2').textContent = dispoAvg.toFixed(2) + '%';
document.getElementById('perf-card').querySelector('h2').textContent = perfAvg.toFixed(2) + '%';
document.getElementById('qual-card').querySelector('h2').textContent = qualAvg.toFixed(2) + '%';
 
// --- Chart TRS évolution ---
const ctxTRS = document.getElementById('trsChart').getContext('2d');
const trsChart = new Chart(ctxTRS, {
    type: 'line',
    data: {
        labels: data.map(d=>d.date),
        datasets: [{
            label: 'TRS %',
            data: data.map(d=>d.trs),
            borderColor: 'green',
            backgroundColor: 'rgba(0,200,0,0.1)',
            fill: true,
            tension: 0.2
        }]
    },
    options: {
        responsive:true,
        plugins:{ legend:{display:true} },
        scales: { y: { beginAtZero:true, max:100 } }
    }
});
 
// --- Chart Disponibilité / Performance / Qualité ---
const ctxDPQ = document.getElementById('dpqChart').getContext('2d');
const dpqChart = new Chart(ctxDPQ, {
    type: 'bar',
    data: {
        labels: data.map(d=>d.date),
        datasets:[
          { label:'Disponibilité', data:data.map(d=>d.dispo), backgroundColor:'rgba(0,123,255,0.7)' },
          { label:'Performance', data:data.map(d=>d.perf), backgroundColor:'rgba(255,193,7,0.7)' },
          { label:'Qualité', data:data.map(d=>d.qual), backgroundColor:'rgba(40,167,69,0.7)' }
        ]
    },
    options:{
        responsive:true,
        scales:{ y:{ beginAtZero:true, max:100 } },
        plugins:{ legend:{position:'top'} }
    }
});
</script>
 
</body>
</html>
